<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <title>Občanství – test (offline)</title>
</head>
<body>
  <header>
    <div class="container">
      <div class="controls">
        <button id="btnStart">Start</button>
        <button id="btnPrev">Předchozí</button>
        <button id="btnNext">Další</button>
        <button id="btnResults">Výsledky</button>
        <div class="spacer"></div>
        <div class="status" id="statusLine">Načítám…</div>
      </div>
      <div class="small" id="subStatus"></div>
    </div>
  </header>

  <main class="container main">
    <section class="card" id="quizPanel">
      <div class="q-head">
        <div class="q-text" id="questionText"></div>
        <button class="btn-secondary" id="btnToggleScan" type="button" aria-expanded="false">Obrázek</button>
      </div>

      <div class="question-wrap" id="scanWrap" style="display:none;">
        <img id="questionImg" class="question-img" alt="Otázka" />
      </div>

      <div class="answers" id="answers">
        <button class="answer" data-choice="A" type="button"><span class="label">A</span><span class="txt" data-slot="A"></span></button>
        <button class="answer" data-choice="B" type="button"><span class="label">B</span><span class="txt" data-slot="B"></span></button>
        <button class="answer" data-choice="C" type="button"><span class="label">C</span><span class="txt" data-slot="C"></span></button>
        <button class="answer" data-choice="D" type="button"><span class="label">D</span><span class="txt" data-slot="D"></span></button>
      </div>
    </section>

    <section class="card" id="resultsPanel">
      <div class="container">
        <h2 style="margin: 6px 0 0 0;">Výsledky</h2>
        <p id="resultsSummary" style="margin: 8px 0 12px 0;"></p>
        <div class="results-controls">
          <button id="btnOnlyWrong" type="button">Jen chybné</button>
          <button id="btnRetryWrong" type="button">Procvičit jen chybné</button>
        </div>
        <div class="results-grid" id="resultsList"></div>
      </div>
    </section>
  </main>

  <footer>
    Offline PWA • Zdroj: <a href="https://cestina-pro-cizince.cz/obcanstvi/databanka-uloh/">NPI ČR (Databanka testových úloh)</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
